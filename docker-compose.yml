version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: medcore-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: medcore
      MONGO_INITDB_ROOT_PASSWORD: medcore123
      MONGO_INITDB_DATABASE: medcore_hms
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medcore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: medcore-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://medcore:medcore123@mongodb:27017/medcore_hms?authSource=admin
      JWT_SECRET: medcore-hms-jwt-secret-2024-production
      JWT_EXPIRATION: 15m
      JWT_REFRESH_SECRET: medcore-hms-refresh-secret-2024-production
      JWT_REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: medcore-client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_APP_NAME: MedCore HMS
    ports:
      - "5173:80"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: medcore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server

volumes:
  mongo_data:
  redis_data:
